name: my-backend-project

services:
  # 資料庫：PostgreSQL
  db:
    image: postgres:16
    container_name: pg_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mysecretpassword}
      POSTGRES_DB: ${DB_NAME:-learning_db}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d learning_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 快取：Valkey
  cache:
    image: valkey/valkey:7.2
    container_name: valkey_cache
    restart: always
    command: valkey-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - cache_data:/data
    networks:
      - backend_network

networks:
  backend_network:
    driver: bridge

volumes:
  pg_data:
  cache_data: